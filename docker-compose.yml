version: "3.8"

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wanderlust-postgres
    environment:
      POSTGRES_DB: wanderlust
      POSTGRES_USER: wanderlust
      POSTGRES_PASSWORD: wanderlust_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wanderlust"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wanderlust-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak (OIDC Provider) ──────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: wanderlust-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/wanderlust
      KC_DB_USERNAME: wanderlust
      KC_DB_PASSWORD: wanderlust_dev
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    depends_on:
      postgres:
        condition: service_healthy

  # ── MinIO (S3-compatible Object Storage) ──────────────────
  minio:
    image: minio/minio
    container_name: wanderlust-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wanderlust
      MINIO_ROOT_PASSWORD: wanderlust_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init ─────────────────────────────────────
  minio-init:
    image: minio/mc
    container_name: wanderlust-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 wanderlust wanderlust_dev;
      mc mb local/wanderlust-media --ignore-existing;
      mc anonymous set download local/wanderlust-media;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
