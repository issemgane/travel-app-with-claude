spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME:wanderlust}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    database-platform: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
    hibernate:
      ddl-auto: none
    open-in-view: false

  data:
    redis:
      url: ${REDIS_URL}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_URI}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  error:
    include-message: always

wanderlust:
  cors:
    allowed-origins: ${FRONTEND_URL:https://wanderlust-frontend.up.railway.app}
  pagination:
    default-page-size: 20
    max-page-size: 100
  feed:
    cache-ttl-minutes: 5
  media:
    s3:
      endpoint: ${S3_ENDPOINT}
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
      bucket: ${S3_BUCKET:wanderlust-media}
      region: ${S3_REGION:auto}
    cdn-base-url: ${CDN_BASE_URL}
    max-file-size-mb: 20
    allowed-types: image/jpeg,image/png,image/webp,video/mp4

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.wanderlust: INFO
    org.hibernate.SQL: WARN
