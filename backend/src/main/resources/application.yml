spring:
  application:
    name: wanderlust-api

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/wanderlust}
    username: ${DATABASE_USERNAME:wanderlust}
    password: ${DATABASE_PASSWORD:wanderlust_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  error:
    include-message: always
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB

wanderlust:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000  # 24 hours
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.wanderlust: ${LOG_LEVEL:INFO}
